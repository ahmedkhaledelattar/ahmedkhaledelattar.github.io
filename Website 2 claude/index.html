<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DocTrino — Medical Content Creator. Follow DocTrino on TikTok, Instagram, YouTube, Facebook, and more.">
<meta property="og:title" content="DocTrino | Medical Content Creator">
<meta property="og:description" content="Follow DocTrino on TikTok, Instagram, YouTube, Facebook, and more.">
<meta property="og:type" content="website">
<meta property="og:image" content="illustration_character.png">
<meta name="theme-color" content="#07120b">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%2307120b' stroke='%2300ff88' stroke-width='2'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='14' font-weight='bold' fill='%2300ff88'%3ED%3C/text%3E%3C/svg%3E">
<title>DocTrino | Medical Content Creator</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'Doran';
  src: url('Doran-ExtraBold.ttf') format('truetype');
  font-weight: 800;
  font-style: normal;
  font-display: swap;
}

:root {
  --primary: #00ff88;
  --secondary: #00c96b;
  --accent: #8affc1;
  --bg: #07120b;
  --glass: rgba(255,255,255,0.08);
  --glass-strong: rgba(255,255,255,0.12);
  --highlight: rgba(255,255,255,0.18);
  --glow: 0 0 30px rgba(0,255,136,0.25), 0 0 60px rgba(0,255,136,0.1);
  --glow-strong: 0 0 40px rgba(0,255,136,0.4), 0 0 80px rgba(0,255,136,0.15);
  --radius: 24px;
  --card-max: 420px;
}

html {
  scroll-behavior: smooth;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Doran', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   VIDEO BACKGROUND
   ============================================================ */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.video-bg video {
  position: absolute;
  top: 50%; left: 50%;
  min-width: 100%; min-height: 100%;
  width: auto; height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
  filter: blur(2px) brightness(0.7);
}

/* Dark overlay */
.video-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(7,18,11,0.7) 0%, rgba(7,18,11,0.4) 40%, rgba(7,18,11,0.7) 100%),
    linear-gradient(135deg, rgba(0,201,107,0.12) 0%, transparent 50%, rgba(0,255,136,0.08) 100%);
  z-index: 1;
}

/* Vignette */
.video-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(7,18,11,0.85) 100%);
  z-index: 2;
}

/* ============================================================
   FLOATING PARTICLES
   ============================================================ */
.particles {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  will-change: transform, opacity;
}

/* ============================================================
   CURSOR REACTIVE LIGHT
   ============================================================ */
.cursor-light {
  position: fixed;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 4;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s ease;
  will-change: left, top;
}

/* ============================================================
   MAIN CONTAINER
   ============================================================ */
.main-wrapper {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 32px 16px;
}

.card {
  width: 100%;
  max-width: var(--card-max);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding: 44px 26px 56px;
  background: linear-gradient(
    168deg,
    rgba(255,255,255,0.09) 0%,
    rgba(255,255,255,0.04) 50%,
    rgba(0,255,136,0.04) 100%
  );
  backdrop-filter: blur(40px) saturate(1.6);
  -webkit-backdrop-filter: blur(40px) saturate(1.6);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px;
  box-shadow:
    0 8px 32px rgba(0,30,15,0.5),
    0 2px 8px rgba(0,20,10,0.3),
    0 0 80px rgba(0,255,136,0.06),
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(40px) scale(0.97);
  animation: cardReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}

/* Glass reflection sweep */
.card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    105deg,
    transparent 40%,
    rgba(255,255,255,0.04) 45%,
    rgba(255,255,255,0.08) 50%,
    rgba(255,255,255,0.04) 55%,
    transparent 60%
  );
  animation: glassReflection 6s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

/* Mouse-reactive highlight overlay */
.card-highlight {
  position: absolute;
  inset: 0;
  border-radius: 32px;
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.4s ease;
  background: radial-gradient(
    300px circle at var(--mx, 50%) var(--my, 50%),
    rgba(0,255,136,0.08) 0%,
    transparent 70%
  );
}

.card:hover .card-highlight {
  opacity: 1;
}

@keyframes cardReveal {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes glassReflection {
  0%, 100% { transform: translateX(-30%) rotate(0deg); }
  50% { transform: translateX(30%) rotate(2deg); }
}

/* Subtle grain texture — breaks digital flatness */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 32px;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: overlay;
}

/* ============================================================
   PROFILE SECTION
   ============================================================ */
.profile-container {
  position: relative;
  width: 140px;
  height: 140px;
  z-index: 2;
}

/* Rotating gradient ring */
.profile-ring {
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--primary),
    var(--secondary),
    var(--accent),
    var(--primary),
    transparent,
    var(--primary)
  );
  animation: ringRotate 4s linear infinite;
  filter: blur(1px);
}

.profile-ring::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--bg);
}

@keyframes ringRotate {
  to { transform: rotate(360deg); }
}

/* Neon glow pulse */
.profile-glow {
  position: absolute;
  inset: -15px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,136,0.3) 0%, transparent 70%);
  animation: glowPulse 3s ease-in-out infinite;
  pointer-events: none;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

/* Avatar wrapper with physics */
.avatar-physics {
  position: relative;
  width: 100%;
  height: 100%;
  will-change: transform;
  animation: avatarFloat 5s ease-in-out infinite;
}

@keyframes avatarFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.avatar-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 15%;
  border: 3px solid rgba(0,255,136,0.4);
  box-shadow:
    0 0 20px rgba(0,255,136,0.3),
    0 8px 32px rgba(0,30,15,0.6);
  position: relative;
  z-index: 1;
  background: var(--bg);
}

/* ============================================================
   TEXT SECTION
   ============================================================ */
.text-section {
  text-align: center;
  z-index: 2;
  position: relative;
}

.profile-name {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #fff;
  text-shadow: 0 0 30px rgba(0,255,136,0.3);
  text-wrap: balance;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.profile-bio {
  font-size: 17px;
  color: rgba(255,255,255,0.92);
  line-height: 1.8;
  direction: rtl;
  font-family: 'Doran', 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
}

/* ============================================================
   SOCIAL BAR
   ============================================================ */
.social-bar-wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* Glass capsule behind icons */
.social-capsule {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 14px 24px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.07) 0%,
    rgba(0,255,136,0.05) 100%
  );
  backdrop-filter: blur(30px) saturate(1.4);
  -webkit-backdrop-filter: blur(30px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 60px;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.3),
    0 0 40px rgba(0,255,136,0.05),
    inset 0 1px 0 rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
  animation: capsuleFloat 6s ease-in-out infinite;
}

.social-capsule::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 60px;
  background: radial-gradient(
    200px circle at var(--smx, 50%) var(--smy, 50%),
    rgba(0,255,136,0.1) 0%,
    transparent 70%
  );
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.social-capsule:hover::before {
  opacity: 1;
}

@keyframes capsuleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

.social-icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  text-decoration: none;
}

.social-icon-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  opacity: 0.5;
  transition: opacity 0.3s;
}

.social-icon-btn::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: radial-gradient(circle, rgba(0,255,136,0.4) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.35s;
  z-index: -1;
}

.social-icon-btn:hover {
  transform: translateY(-4px) scale(1.12);
  background: rgba(0,255,136,0.12);
  border-color: rgba(0,255,136,0.3);
  box-shadow: 0 4px 20px rgba(0,255,136,0.3), 0 0 40px rgba(0,255,136,0.1);
}

.social-icon-btn:hover::after {
  opacity: 1;
}

.social-icon-btn:active {
  transform: translateY(-1px) scale(0.95);
  transition-duration: 0.1s;
}

.social-icon-btn img {
  width: 22px;
  height: 22px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  position: relative;
  z-index: 1;
  transition: filter 0.3s;
}

.social-icon-btn:hover img {
  filter: brightness(0) invert(1) drop-shadow(0 0 6px rgba(0,255,136,0.6));
}

/* ============================================================
   LINK BUTTONS
   ============================================================ */
.buttons-section {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  z-index: 2;
  position: relative;
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 20px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.08) 0%,
    rgba(255,255,255,0.03) 100%
  );
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  color: #fff;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  opacity: 0;
  transform: translateY(30px);
  box-shadow:
    0 4px 16px rgba(0,30,15,0.35),
    inset 0 1px 0 rgba(255,255,255,0.1),
    inset 0 -1px 0 rgba(255,255,255,0.04);
}

/* Glass reflection */
.link-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );
  transition: left 0.6s ease;
}

/* Mouse-reactive gradient */
.link-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  background: radial-gradient(
    200px circle at var(--bx, 50%) var(--by, 50%),
    rgba(0,255,136,0.1) 0%,
    transparent 70%
  );
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.link-btn:hover {
  transform: translateY(-3px) scale(1.02);
  border-color: rgba(0,255,136,0.25);
  box-shadow:
    0 8px 32px rgba(0,30,15,0.4),
    0 0 40px rgba(0,255,136,0.15),
    inset 0 1px 0 rgba(255,255,255,0.15);
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.12) 0%,
    rgba(0,255,136,0.06) 100%
  );
}

.link-btn:hover::before {
  left: 100%;
}

.link-btn:hover::after {
  opacity: 1;
}

.link-btn:active {
  transform: translateY(0) scale(0.98);
  transition-duration: 0.1s;
}

/* Staggered entrance */
.link-btn.visible {
  animation: btnReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.link-btn:nth-child(1).visible { animation-delay: 0.5s; }
.link-btn:nth-child(2).visible { animation-delay: 0.65s; }
.link-btn:nth-child(3).visible { animation-delay: 0.8s; }
.link-btn:nth-child(4).visible { animation-delay: 0.95s; }

@keyframes btnReveal {
  to { opacity: 1; transform: translateY(0); }
}

/* Continuous attractive vibrate/pulse */
.link-btn.alive {
  animation: btnAttract 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

.link-btn:nth-child(1).alive { animation-delay: 0s; }
.link-btn:nth-child(2).alive { animation-delay: 0.75s; }
.link-btn:nth-child(3).alive { animation-delay: 1.5s; }
.link-btn:nth-child(4).alive { animation-delay: 2.25s; }

@keyframes btnAttract {
  0%   { transform: translateX(0) scale(1); box-shadow: 0 4px 16px rgba(0,30,15,0.35), inset 0 1px 0 rgba(255,255,255,0.1); }
  3%   { transform: translateX(-2px) scale(1.008); }
  6%   { transform: translateX(2px) scale(1.012); }
  9%   { transform: translateX(-1.5px) scale(1.015); }
  12%  { transform: translateX(1.5px) scale(1.018); }
  15%  { transform: translateX(-1px) scale(1.015); }
  18%  { transform: translateX(1px) scale(1.01); border-color: rgba(0,255,136,0.3); box-shadow: 0 4px 20px rgba(0,30,15,0.4), 0 0 25px rgba(0,255,136,0.15), inset 0 1px 0 rgba(255,255,255,0.12); }
  21%  { transform: translateX(-0.5px) scale(1.005); }
  24%  { transform: translateX(0) scale(1); border-color: rgba(255,255,255,0.08); box-shadow: 0 4px 16px rgba(0,30,15,0.35), inset 0 1px 0 rgba(255,255,255,0.1); }
  100% { transform: translateX(0) scale(1); }
}

/* Hover override — stop vibrate, do premium lift */
.link-btn:hover {
  animation: none !important;
  transform: translateY(-3px) scale(1.025);
}

.btn-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  object-fit: contain;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  padding: 7px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
}

/* For image-based button icons: don't invert, show original colors */
.btn-icon-image {
  filter: none;
}

/* For SVG-inline button icons */
.btn-icon-svg {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  padding: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
}

.btn-text {
  flex: 1;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 1;
}

.btn-arrow {
  opacity: 0.4;
  font-size: 18px;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
}

.link-btn:hover .btn-arrow {
  opacity: 1;
  transform: translateX(3px);
  color: var(--primary);
}

/* ============================================================
   FOOTER
   ============================================================ */
.footer {
  text-align: center;
  margin-top: 4px;
  padding-top: 22px;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 2;
  position: relative;
  opacity: 0;
  animation: fadeIn 1s ease 1.3s forwards;
  width: 60%;
}

.footer p {
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* ============================================================
   PAGE REVEAL OVERLAY
   ============================================================ */
.page-reveal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pageRevealOut 0.8s cubic-bezier(0.77, 0, 0.175, 1) 0.5s forwards;
}

.page-reveal::after {
  content: '';
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0,255,136,0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes pageRevealOut {
  to { opacity: 0; visibility: hidden; pointer-events: none; }
}

/* ============================================================
   GLOW TRAIL (animated line)
   ============================================================ */
.glow-trail {
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0;
  animation: trailSweep 4s ease-in-out infinite;
  border-radius: 2px;
  z-index: 5;
  pointer-events: none;
}

@keyframes trailSweep {
  0%, 100% { opacity: 0; transform: scaleX(0); }
  50% { opacity: 0.6; transform: scaleX(1); }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .main-wrapper {
    padding: 20px 12px;
  }
  .card {
    padding: 32px 18px 40px;
    border-radius: 28px;
  }
  .profile-name { font-size: 28px; }
  .profile-bio { font-size: 15px; }
  .social-capsule { gap: 10px; padding: 12px 18px; }
  .social-icon-btn { width: 40px; height: 40px; }
  .social-icon-btn img { width: 20px; height: 20px; }
  .link-btn { padding: 14px 16px; }
  .btn-icon, .btn-icon-svg { width: 32px; height: 32px; }
  .btn-text { font-size: 15px; }
}

@media (max-width: 360px) {
  .social-capsule { gap: 8px; padding: 10px 14px; }
  .social-icon-btn { width: 36px; height: 36px; }
  .social-icon-btn img { width: 18px; height: 18px; }
  .profile-name { font-size: 24px; }
}

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- Page Reveal -->
<div class="page-reveal" id="pageReveal"></div>

<!-- Video Background -->
<div class="video-bg">
  <video autoplay loop muted playsinline disablepictureinpicture>
    <source src="Background.mp4" type="video/mp4">
  </video>

<script>
(function() {
  'use strict';

  /* ==============================================================
     FLOATING PARTICLES
     ============================================================== */
  const particlesContainer = document.getElementById('particles');
  const PARTICLE_COUNT = 30;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    const x = Math.random() * 100;
    const duration = Math.random() * 20 + 15;
    const delay = Math.random() * 10;
    const opacity = Math.random() * 0.3 + 0.05;
    Object.assign(p.style, {
      width: size + 'px',
      height: size + 'px',
      left: x + '%',
      bottom: '-5%',
      background: `radial-gradient(circle, rgba(0,255,136,${opacity + 0.2}) 0%, rgba(0,255,136,0) 70%)`,
      animation: `particleRise ${duration}s ${delay}s linear infinite`
    });
    particlesContainer.appendChild(p);
  }

  // Inject particle keyframe
  const particleStyle = document.createElement('style');
  particleStyle.textContent = `
    @keyframes particleRise {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-110vh) translateX(${Math.random() > 0.5 ? '' : '-'}${Math.random() * 80 + 20}px); opacity: 0; }
    }
  `;
  document.head.appendChild(particleStyle);

  /* ==============================================================
     CURSOR REACTIVE LIGHT
     ============================================================== */
  const cursorLight = document.getElementById('cursorLight');
  let lightX = -500, lightY = -500;

  function updateCursorLight(e) {
    lightX = e.clientX;
    lightY = e.clientY;
    cursorLight.style.left = lightX + 'px';
    cursorLight.style.top = lightY + 'px';
  }

  document.addEventListener('mousemove', updateCursorLight, { passive: true });

  /* ==============================================================
     CARD MOUSE-REACTIVE HIGHLIGHT
     ============================================================== */
  const mainCard = document.getElementById('mainCard');
  const cardHighlight = document.getElementById('cardHighlight');

  mainCard.addEventListener('mousemove', function(e) {
    const rect = mainCard.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    cardHighlight.style.setProperty('--mx', x + '%');
    cardHighlight.style.setProperty('--my', y + '%');
  }, { passive: true });

  /* ==============================================================
     SOCIAL CAPSULE MOUSE REACTIVE
     ============================================================== */
  const socialCapsule = document.getElementById('socialCapsule');

  socialCapsule.addEventListener('mousemove', function(e) {
    const rect = socialCapsule.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    socialCapsule.style.setProperty('--smx', x + '%');
    socialCapsule.style.setProperty('--smy', y + '%');
  }, { passive: true });

  /* ==============================================================
     BUTTON MOUSE-REACTIVE HIGHLIGHT
     ============================================================== */
  const linkBtns = document.querySelectorAll('.link-btn');
  linkBtns.forEach(function(btn) {
    btn.addEventListener('mousemove', function(e) {
      const rect = btn.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
      const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
      btn.style.setProperty('--bx', x + '%');
      btn.style.setProperty('--by', y + '%');
    }, { passive: true });
  });

  /* ==============================================================
     STAGGERED BUTTON REVEAL
     ============================================================== */
  function revealButtons() {
    linkBtns.forEach(function(btn) {
      btn.classList.add('visible');
    });
    // After entrance animations finish, switch to continuous vibrate
    setTimeout(function() {
      linkBtns.forEach(function(btn) {
        btn.classList.remove('visible');
        btn.style.opacity = '1';
        btn.style.transform = 'translateY(0)';
        btn.classList.add('alive');
      });
    }, 1800);
  }
  // Trigger after card reveals
  setTimeout(revealButtons, 400);

  /* ==============================================================
     PHYSICS-BASED AVATAR AVOIDANCE
     ============================================================== */
  const profileContainer = document.getElementById('profileContainer');
  const avatarPhysics = document.getElementById('avatarPhysics');

  // Physics state
  let avatarX = 0, avatarY = 0;    // current displacement
  let velX = 0, velY = 0;           // velocity
  const SPRING = 0.06;              // spring constant (return to center)
  const DAMPING = 0.85;             // velocity damping
  const REPEL_RADIUS = 180;         // cursor influence radius
  const REPEL_STRENGTH = 12;        // max repulsion force
  const MAX_DISPLACEMENT = 25;      // max px away from center
  let isMouseNear = false;

  function avatarPhysicsLoop() {
    // Spring force: pull back to center
    const springForceX = -SPRING * avatarX;
    const springForceY = -SPRING * avatarY;

    velX += springForceX;
    velY += springForceY;

    // Damping
    velX *= DAMPING;
    velY *= DAMPING;

    // Update position
    avatarX += velX;
    avatarY += velY;

    // Clamp displacement
    const dist = Math.sqrt(avatarX * avatarX + avatarY * avatarY);
    if (dist > MAX_DISPLACEMENT) {
      const scale = MAX_DISPLACEMENT / dist;
      avatarX *= scale;
      avatarY *= scale;
    }

    // Stop tiny oscillations
    if (Math.abs(avatarX) < 0.05 && Math.abs(velX) < 0.01 &&
        Math.abs(avatarY) < 0.05 && Math.abs(velY) < 0.01 && !isMouseNear) {
      avatarX = 0; avatarY = 0;
      velX = 0; velY = 0;
    }

    avatarPhysics.style.transform = `translate(${avatarX}px, ${avatarY}px)`;
    requestAnimationFrame(avatarPhysicsLoop);
  }

  document.addEventListener('mousemove', function(e) {
    const rect = profileContainer.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const dx = e.clientX - centerX;
    const dy = e.clientY - centerY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < REPEL_RADIUS && distance > 0) {
      isMouseNear = true;
      // Normalized direction from cursor to avatar center
      const nx = -dx / distance;
      const ny = -dy / distance;

      // Force proportional to closeness (inverse square, capped)
      const proximity = 1 - (distance / REPEL_RADIUS);
      const force = REPEL_STRENGTH * proximity * proximity;

      // Add orbital tangent force for circular motion feel
      const tangentX = -ny;
      const tangentY = nx;
      const tangentForce = force * 0.4;

      velX += nx * force * 0.15 + tangentX * tangentForce * 0.08;
      velY += ny * force * 0.15 + tangentY * tangentForce * 0.08;
    } else {
      isMouseNear = false;
    }
  }, { passive: true });

  // Start physics loop
  requestAnimationFrame(avatarPhysicsLoop);

  /* ==============================================================
     TOUCH: disable avatar physics on touch (not relevant)
     ============================================================== */
  document.addEventListener('touchstart', function() {
    isMouseNear = false;
  }, { passive: true });

  /* ==============================================================
     VIDEO AUTOPLAY FALLBACK
     ============================================================== */
  const video = document.querySelector('.video-bg video');
  if (video) {
    video.play().catch(function() {
      // Autoplay blocked — try on interaction
      document.addEventListener('touchstart', function playOnce() {
        video.play();
        document.removeEventListener('touchstart', playOnce);
      }, { once: true });
    });
  }

  /* ==============================================================
     REMOVE PAGE REVEAL ON LOAD
     ============================================================== */
  window.addEventListener('load', function() {
    const reveal = document.getElementById('pageReveal');
    if (reveal) {
      setTimeout(function() {
        reveal.style.display = 'none';
      }, 1400);
    }
  });

})();
</script>
